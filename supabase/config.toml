# Declarative Supabase auth configuration, applied with
# `supabase config push --project-ref <ref>`. Email confirmation is off by
# design: players sign up with a code at a hacknight and play immediately, and
# the Playwright signup E2E cannot complete an email round-trip.

project_id = "jumbogames"

[auth]
enabled = true
site_url = "https://jumbogames.vercel.app"
additional_redirect_urls = ["https://jumbogames.vercel.app/**"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
